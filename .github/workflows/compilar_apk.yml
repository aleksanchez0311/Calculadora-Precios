name: Compilar APK Release de Android

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Instalar herramientas del SDK necesarias
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip wget
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          elif [ -x "$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager"
          elif [ -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          else
            echo "No se encontró sdkmanager en el runner. Intentando descargar commandline-tools..."
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            cd /tmp
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "SDKMANAGER=$SDKMANAGER"
          yes | $SDKMANAGER --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | $SDKMANAGER --sdk_root=$ANDROID_SDK_ROOT --licenses || true

      - name: Preparar Gradle wrapper o instalar Gradle temporalmente
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          else
            echo "Gradle wrapper no encontrado. Descargando Gradle para usarlo temporalmente..."
            GRADLE_VERSION=8.5.1
            DOWNLOAD_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            set +e
            curl -fSL --retry 5 --retry-delay 5 -o /tmp/gradle.zip "$DOWNLOAD_URL"
            CURL_EXIT=$?
            set -e
            if [ $CURL_EXIT -ne 0 ] || [ ! -s /tmp/gradle.zip ]; then
              echo "Descarga fallida o archivo vacío: /tmp/gradle.zip (curl exit=$CURL_EXIT)"
              echo "Intentando instalar gradle vía apt como fallback..."
              sudo apt-get update
              sudo apt-get install -y gradle
              gradle -v
            else
              unzip -q /tmp/gradle.zip -d /tmp/
              export PATH=/tmp/gradle-${GRADLE_VERSION}/bin:$PATH
              gradle -v
            fi
          fi

      - name: Preparar keystore (si está en secretos)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Compilar Release (firmado si hay secretos)
        run: |
          if [ -f ./gradlew ]; then
            GRADLE_CMD="./gradlew"
          else
            GRADLE_CMD="gradle"
          fi

          if [ -f release.keystore ]; then
            echo "Ejecutando build firmado..."
            $GRADLE_CMD :app:assembleRelease -Pandroid.injected.signing.store.file=release.keystore -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" -Pandroid.injected.signing.key.alias="$KEY_ALIAS" -Pandroid.injected.signing.key.password="$KEY_PASSWORD" --no-daemon --stacktrace
          else
            echo "Ejecutando build release (sin firma)..."
            $GRADLE_CMD :app:assembleRelease --no-daemon --stacktrace
          fi

      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
