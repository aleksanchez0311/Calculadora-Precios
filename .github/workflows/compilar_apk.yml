name: Compilar APK de Android

on:
  push:
    branches: [ "main", "master" ] # Se ejecuta al subir cambios a estas ramas
  workflow_dispatch: # Te permite activar la compilación manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Instalar herramientas del SDK necesarias
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip wget
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          elif [ -x "$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager"
          elif [ -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          else
            echo "No se encontró sdkmanager en el runner. Intentando descargar commandline-tools..."
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            cd /tmp
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "SDKMANAGER=$SDKMANAGER"
          yes | $SDKMANAGER --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | $SDKMANAGER --sdk_root=$ANDROID_SDK_ROOT --licenses || true

      - name: Asegurar permiso en wrapper y ejecutar build
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
          else
            echo "Gradle wrapper no encontrado. Descargando Gradle moderno y ejecutando build..."
            GRADLE_VERSION=8.5.1
            DOWNLOAD_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            echo "Descargando $DOWNLOAD_URL"
            curl -fSL --retry 5 --retry-delay 5 -o /tmp/gradle.zip "$DOWNLOAD_URL" || true
            if [ ! -s /tmp/gradle.zip ]; then
              echo "Descarga fallida o archivo vacío: /tmp/gradle.zip"
              echo "Intentando instalar gradle vía apt como fallback..."
              sudo apt-get update
              sudo apt-get install -y gradle
              gradle -v
              gradle :app:assembleDebug --no-daemon --stacktrace || (echo "Gradle build failed"; exit 1)
            else
              set -e
              unzip -q /tmp/gradle.zip -d /tmp/
              export PATH=/tmp/gradle-${GRADLE_VERSION}/bin:$PATH
              gradle -v
              gradle :app:assembleDebug --no-daemon --stacktrace || (echo "Gradle build failed"; exit 1)
            fi
          fi

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: apk-animado
          path: app/build/outputs/apk/debug/*.apk
